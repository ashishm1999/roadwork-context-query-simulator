[general]
scenario = melbourne-roadwork
random_seed = 20260703
default_horizon_hours = 24
default_query_count = 280000

[sites]
sites_json = ../../../dataset/roadwork_sites.json

[consumers]
consumer_types_json = ../../../dataset/consumer_types.json
vin_registry_csv = ../../../dataset/vehicles.csv

[incidents]
history_csv = ../../../dataset/incidents.csv
burst_probability = 0.06
burst_horizon_min = 30

[weather]
stations_csv = ../../../dataset/weather_stations.csv
refresh_period_s = 300

[distribution]
morning_peak_hour = 7.5
evening_peak_hour = 17.5
morning_sigma_h  = 1.2
evening_sigma_h  = 1.4
offpeak_floor    = 0.15
peak_amplitude   = 0.85

[cdql]
prefix = prefix schema:http//schema.org
freshness_field = targetRoadwork.freshness
qoc_field       = targetRoadwork.qoc
delay_field     = targetRoadwork.time_delay

[output]
sample_dir = ../../../sample
template_dir = ../../../dataset
